# JournalCache HTTP ext handler configuration
#
# Loaded via:
#   http.exthandler journalcache libXrdClJournalCacheHttpExt-5.so /etc/xrootd/journalcache-http.ext.conf

# XRootD URL used for reading file xattrs (typically this server or PSS origin)
server = root://localhost:1094

# Local journal cache root (must match client plugin cache=); enables 304 and
# response header emission from on-disk journal xattrs
# cache = /var/tmp/journalcache/

# Match client plugin layout (optional; defaults shown)
# flat = 0
# basepath = /store

# Set forwarding = 1 for PSS paths like /https://host/path (see
# journalcache-http-forwarding.ext.conf)
# forwarding = 0

# Only inject cache CGI for paths under this prefix
prefix = /

# Skip static resources served by XrdHttp itself
exclude = /static/

# Redirect subtrees externally instead of serving through cache (repeatable)
# external_redirect = /live/ https://stream.example.org/live/
# external_redirect = /store/raw/ root://data.cern.ch:1094//store/raw/

# Optional HTTP origin for fetching setter headers via HEAD
# http_origin = https://origin.example.org
# http_origin_strip = /store

# Optional custom xattr -> CGI mapping (defaults cover http.* xattrs)
# xattr http.cache-control xrd.journalcache.cache-control
