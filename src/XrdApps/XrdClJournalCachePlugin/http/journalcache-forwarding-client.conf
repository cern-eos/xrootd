# Client plugins for JournalCache HTTP forwarding proxy (xrootd process)
#
# Install as /etc/xrootd/client.plugins.d/journalcache-forwarding.conf

url = *
lib = libXrdClJournalCachePlugin-5.so
enable = true
cache = /var/tmp/journalcache/
stats = 60

url = http*
lib = libXrdClHttp.so
enable = true

url = https*
lib = libXrdClHttp.so
enable = true

# On the proxy server process, unwrap chained URLs and enforce allow_origin.
multi_origin = 1
allow_origin = ^root://([a-z0-9.-]+\.)?cern\.ch(:1094)?/,^https://([a-z0-9.-]+\.)?example\.org/

# Redirect live streams externally instead of caching them
external_redirect = /live/|https://stream.example.org/live/
