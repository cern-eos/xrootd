# JournalCache HTTP ext handler — forwarding proxy mode
#
# Use with PSS configured as a forwarding proxy:
#   pss.origin =http,https
#
# Browser/clients request paths like:
#   GET /https://cdn.example.org/store/file.dat

forwarding = 1

# Must match the JournalCache client plugin cache= path
cache = /var/tmp/journalcache/

# Match client plugin layout
flat = 0
basepath =

prefix = /
exclude = /static/

# Restrict upstream hosts (repeat allow_origin or use comma-separated regexes)
allow_origin = ^https://([a-z0-9.-]+\.)?example\.org/
allow_origin = ^root://([a-z0-9.-]+\.)?cern\.ch(:1094)?/

# server, http_origin, and xattr lookups are not used in forwarding mode;
# the upstream URL is parsed from each request path and cache headers are
# fetched via HTTP HEAD to that origin when libcurl is available.
