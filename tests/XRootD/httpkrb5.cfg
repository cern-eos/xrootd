set name = httpkrb5
set port = 7194

set pwd = $PWD
set src = $SOURCE_DIR

xrd.protocol https:$port libXrdHttp.so

xrd.tlsca certfile $pwd/../tls/ca.pem
xrd.tls $pwd/../tls/host.pem $pwd/../tls/host.key

http.tlsclientauth off
http.auth krb5 $pwd/../krb5/krb5.keytab HTTP/localhost@XROOTD.ORG

continue $src/common.cfg
